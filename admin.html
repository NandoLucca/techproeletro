<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TechProEletro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box, .painel { background: #1e293b; padding: 40px; border-radius: 12px; width: 90%; max-width: 500px; border: 1px solid #334155; }
        .painel { max-width: 900px; display: none; }
        h1 { margin-bottom: 20px; text-align: center; color: #f1f5f9; }
        h1 span { color: #3b82f6; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #2563eb; }
        .erro { color: #ef4444; text-align: center; margin-top: 10px; }
        .aviso { background: #1e3a8a; border: 1px solid #3b82f6; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .form-add { background: #0f172a; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .form-add h3 { margin-bottom: 15px; color: #3b82f6; }
        .produto-lista { margin-top: 20px; }
        .produto-item { background: #0f172a; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .produto-item img { border-radius: 6px; }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h1>TechProEletro <span>Admin</span></h1>
        <input type="password" id="senha" placeholder="Digite a senha" />
        <button onclick="fazerLogin()">Entrar</button>
        <div class="erro" id="erro"></div>
    </div>

    <div class="painel" id="painel">
        <h1>Painel <span>TechProEletro</span></h1>
        <div class="aviso">
            <strong>✅ Hospedado no Render</strong><br>
            Você pode adicionar produtos novos aqui. Eles ficam salvos no servidor.
        </div>

        <div class="form-add">
            <h3>Adicionar Produto</h3>
            <input type="text" id="nome" placeholder="Nome do produto" />
            <input type="text" id="preco" placeholder="Preço: 299.00" />
            <input type="text" id="img" placeholder="URL da imagem" />
            <input type="text" id="link" placeholder="Link de afiliado Amazon" />
            <button onclick="adicionarProduto()">Adicionar Produto</button>
        </div>

        <h3>Produtos cadastrados:</h3>
        <div class="produto-lista" id="listaProdutos"></div>
    </div>

    <script>
        async function fazerLogin() {
            const senha = document.getElementById('senha').value;
            const erroDiv = document.getElementById('erro');
            
            try {
                const resposta = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senha })
                });
                
                const dados = await resposta.json();
                
                if (dados.success) {
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('painel').style.display = 'block';
                    carregarProdutos();
                } else {
                    erroDiv.textContent = 'Senha incorreta!';
                }
            } catch (error) {
                erroDiv.textContent = 'Erro ao conectar.';
            }
        }

        async function carregarProdutos() {
            const resposta = await fetch('/api/produtos');
            const produtos = await resposta.json();
            const lista = document.getElementById('listaProdutos');
            
            lista.innerHTML = '';
            produtos.forEach(p => {
                lista.innerHTML += `
                    <div class="produto-item">
                        <div>
                            <strong>${p.nome}</strong><br>
                            R$ ${p.preco}<br>
                            <small style="color:#64748b">${p.link}</small>
                        </div>
                        <img src="${p.img}" width="80" height="80" style="object-fit: cover;">
                    </div>
                `;
            });
        }

        async function adicionarProduto() {
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;
            const img = document.getElementById('img').value;
            const link = document.getElementById('link').value;

            if (!nome || !preco || !img || !link) {
                alert('Preenche todos os campos');
                return;
            }

            await fetch('/api/produtos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, preco, img, link })
            });

            document.getElementById('nome').value = '';
            document.getElementById('preco').value = '';
            document.getElementById('img').value = '';
            document.getElementById('link').value = '';
            
            carregarProdutos();
        }

        document.getElementById('senha').addEventListener('keypress', e => {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>
</body>
</html>
