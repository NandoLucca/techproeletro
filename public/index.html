<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechProEletro - Tecnologia e Inovação</title>
  
  <!-- Google Analytics - TROCA G-XXXXXXXXXX PELO TEU ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      padding: 25px 20px;
      box-shadow: 0 4px 20px rgba(138, 43, 226, 0.3);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo-area h1 {
      font-size: 38px;
      font-weight: 900;
      background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
      filter: drop-shadow(0 4px 8px rgba(139, 92, 246, 0.4));
    }

    .logo-area p {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 5px;
      margin-left: 50px;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      padding: 12px 20px;
      padding-right: 45px;
      border: 2px solid #8b5cf6;
      background: rgba(255,255,255,0.1);
      color: white;
      border-radius: 25px;
      width: 320px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }

    .search-box input:focus {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
      border-color: #a855f7;
    }

    .search-box input::placeholder {
      color: #94a3b8;
    }

    .container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .filtros {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filtro-btn {
      padding: 12px 32px;
      border: none;
      background: rgba(139, 92, 246, 0.2);
      color: #e9d5ff;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .filtro-btn:hover {
      background: rgba(139, 92, 246, 0.4);
      transform: translateY(-2px);
    }

    .filtro-btn.ativo {
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      color: white;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5);
    }

    .grid-produtos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 30px;
    }

    .card-produto {
      background: rgba(30, 27, 75, 0.6);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      transition: all 0.4s;
    }

    .card-produto:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4);
      border-color: rgba(168, 85, 247, 0.6);
    }

    .card-img-container {
      background: white;
      padding: 25px;
      position: relative;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .badge-categoria {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(30, 27, 75, 0.95);
      color: #e9d5ff;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-oferta {
      position: absolute;
      top: 15px;
      right: 15px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
    }

    .card-conteudo {
      padding: 25px;
    }

    .card-nome {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 20px;
      line-height: 1.5;
      min-height: 48px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-preco {
      margin-bottom: 20px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .preco {
      font-size: 34px;
      font-weight: 800;
      background: linear-gradient(90deg, #a855f7 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ÚNICA ADIÇÃO: À VISTA */
    .a-vista {
      font-size: 13px;
      color: #a855f7;
      font-weight: 600;
    }

    .btn-comprar {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 50%, #ec4899 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      text-align: center;
      display: block;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
      text-transform: uppercase;
    }

    .btn-comprar:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 25px rgba(139, 92, 246, 0.7);
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      font-size: 18px;
      color: #cbd5e1;
    }

    footer {
      background: #0f0c29;
      color: #94a3b8;
      text-align: center;
      padding: 40px 20px;
      margin-top: 80px;
      border-top: 1px solid rgba(139, 92, 246, 0.2);
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
      }
      .search-box input {
        width: 100%;
      }
      .grid-produtos {
        grid-template-columns: 1fr;
      }
      .logo-area h1 {
        font-size: 30px;
      }
      .logo-area p {
        margin-left: 0;
      }
      .preco {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo-area">
        <h1>🚀 TechProEletro</h1>
        <p>Tecnologia e Inovação</p>
      </div>
      <div class="search-box">
        <input type="text" id="busca" placeholder="Buscar produto...">
      </div>
    </div>
  </header>

  <div class="container">
    <div class="filtros" id="filtros">
      <button class="filtro-btn ativo" data-categoria="todos">Todos</button>
    </div>

    <div class="grid-produtos" id="produtos">
      <div class="loading">Carregando ofertas...</div>
    </div>
  </div>

  <footer>
    <p>TechProEletro © 2026 - Todos os direitos reservados</p>
    <p style="margin-top: 10px; font-size: 13px;">Este site contém links de afiliado. Podemos receber comissão por compras realizadas.</p>
  </footer>

  <script>
    let todosProdutos = [];
    let categoriaAtual = 'todos';

    function formatarPreco(valor) {
      if (!valor) return 'Consulte';
      return Number(valor).toLocaleString('pt-BR', { 
        style: 'currency', 
        currency: 'BRL' 
      });
    }

    function rastrearClique(produto) {
      gtag('event', 'clique_afiliado', {
        'produto_nome': produto.nome,
        'produto_preco': produto.preco,
        'produto_categoria': produto.categoria || 'Eletrônicos',
        'link_destino': produto.link
      });
    }

    function renderizarProdutos(produtos) {
      const container = document.getElementById('produtos');
      
      if (produtos.length === 0) {
        container.innerHTML = '<div class="loading">Nenhum produto encontrado.</div>';
        return;
      }

      container.innerHTML = produtos.map(produto => `
        <div class="card-produto">
          <div class="card-img-container">
            <span class="badge-categoria">${produto.categoria || 'Eletrônicos'}</span>
            ${produto.destaque ? '<span class="badge-oferta">OFERTA</span>' : ''}
            <img src="${produto.img}" alt="${produto.nome}" class="card-img" loading="lazy">
          </div>
          <div class="card-conteudo">
            <h3 class="card-nome">${produto.nome}</h3>
            <div class="card-preco">
              <span class="preco">${formatarPreco(produto.preco)}</span>
              <span class="a-vista">à vista</span>
            </div>
            <a href="${produto.link}" 
               target="_blank" 
               class="btn-comprar"
               onclick="rastrearClique(${JSON.stringify(produto).replace(/"/g, '&quot;')})">
               COMPRAR AGORA
            </a>
          </div>
        </div>
      `).join('');
    }

    function criarFiltros(produtos) {
      const categorias = [...new Set(produtos.map(p => p.categoria || 'Eletrônicos'))];
      const container = document.getElementById('filtros');
      
      const botoes = categorias.map(cat => 
        `<button class="filtro-btn" data-categoria="${cat}">${cat}</button>`
      ).join('');
      
      container.innerHTML = '<button class="filtro-btn ativo" data-categoria="todos">Todos</button>' + botoes;

      document.querySelectorAll('.filtro-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
          btn.classList.add('ativo');
          
          categoriaAtual = btn.dataset.categoria;
          const filtrados = categoriaAtual === 'todos' 
            ? todosProdutos 
            : todosProdutos.filter(p => (p.categoria || 'Eletrônicos') === categoriaAtual);
          
          renderizarProdutos(filtrados);
        });
      });
    }

    // Busca em tempo real
    document.getElementById('busca').addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase();
      const filtrados = todosProdutos.filter(p => 
        p.nome.toLowerCase().includes(termo) || 
        (p.categoria || '').toLowerCase().includes(termo)
      );
      renderizarProdutos(filtrados);
    });

    async function carregarProdutos() {
      try {
        const res = await fetch('/api/produtos');
        todosProdutos = await res.json();
        
        // Ordena: destaques primeiro
        todosProdutos.sort((a, b) => {
          if (a.destaque && !b.destaque) return -1;
          if (!a.destaque && b.destaque) return 1;
          return 0;
        });

        criarFiltros(todosProdutos);
        renderizarProdutos(todosProdutos);
      } catch (error) {
        document.getElementById('produtos').innerHTML = 
          '<div class="loading">Erro ao carregar produtos. Tente novamente.</div>';
        console.error('Erro:', error);
      }
    }

    carregarProdutos();
  </script>
</body>
</html>
