<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechProEletro - Ofertas Exclusivas</title>
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NHGZMX15YK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NHGZMX15YK');
  </script>
  <!-- Fim Google Analytics -->
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0c29;
      background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
      color: #fff;
      overflow-x: hidden;
    }

 .header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(15, 12, 41, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 25px 20px;
    }
 .header-content {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
 .logo {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(102, 126, 234, 0.6);
      display: inline-block;
      letter-spacing: -1px;
    }
 .tagline {
      font-size: 14px;
      opacity: 0.6;
      margin-top: 8px;
      font-weight: 400;
    }
 .search-box {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
 .search-box input {
      width: 100%;
      padding: 12px 45px 12px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 25px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }
 .search-box input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: #667eea;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
    }
 .search-box input::placeholder { color: rgba(255, 255, 255, 0.5); }
 .search-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.6;
    }

 .hero {
      text-align: center;
      padding: 50px 20px 30px;
      max-width: 800px;
      margin: 0 auto;
    }
 .hero h2 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
      color: #fff;
      opacity: 0.95;
    }
 .hero p {
      font-size: 16px;
      opacity: 0.7;
      font-weight: 400;
    }

 .tabs {
      max-width: 1300px;
      margin: 0 auto 30px;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
 .tab {
      padding: 12px 28px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      font-size: 15px;
      position: relative;
      top: 1px;
    }
 .tab:hover {
      color: white;
    }
 .tab.ativo {
      color: white;
      border-bottom-color: #667eea;
    }

 .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }
 .section-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
 .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }

 .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: aparecer 0.5s ease-out backwards;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

 .card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 20px 50px rgba(102, 126, 234, 0.3);
      border-color: rgba(102, 126, 234, 0.4);
    }

 .card-img-wrapper {
      position: relative;
      overflow: hidden;
      height: 280px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
 .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.5s;
    }
 .card:hover img { transform: scale(1.05); }

 .badge-oferta {
      position: absolute;
      top: 15px;
      right: 15px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
      z-index: 2;
    }

 .badge-categoria {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 600;
      z-index: 2;
    }

 .card-body { padding: 25px; }
 .card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      min-height: 45px;
      color: #fff;
      line-height: 1.4;
    }
 .preco {
      font-size: 34px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0 20px;
    }
 .btn-comprar {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 .btn-comprar:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }

 .loading,.vazio {
      text-align: center;
      padding: 80px 20px;
      font-size: 18px;
      opacity: 0.6;
      grid-column: 1/-1;
    }

    footer {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      text-align: center;
      padding: 35px 20px;
      margin-top: 80px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    footer p {
      opacity: 0.6;
      font-size: 14px;
      font-weight: 400;
    }
    footer .copyright {
      font-weight: 500;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
   .logo { font-size: 32px; }
   .hero h2 { font-size: 26px; }
   .grid { grid-template-columns: 1fr; }
   .header-content { flex-direction: column; align-items: flex-start; }
   .search-box { max-width: 100%; }
   .tabs { overflow-x: auto; justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div>
        <div class="logo">🚀 TechProEletro</div>
        <div class="tagline">Tecnologia e Inovação</div>
      </div>
      <div class="search-box">
        <input type="text" id="campoBusca" placeholder="Buscar produto...">
        <span class="search-icon">🔍</span>
      </div>
    </div>
  </div>

  <div class="hero">
    <h2>Ofertas Que Saltam Da Tela</h2>
    <p>Produtos selecionados com os melhores preços do mercado</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab ativo" data-categoria="destaques">⭐ Destaques</button>
  </div>

  <div class="container">
    <div id="secaoProdutos">
      <div class="loading">⚡ Carregando ofertas...</div>
    </div>
  </div>

  <footer>
    <p class="copyright">&copy; 2026 TechProEletro. Todos os direitos reservados.</p>
    <p>CNPJ: 00.000.000/0001-00 | Contato: contato@techproeletro.com</p>
  </footer>

<script>
let todosProdutos = [];
let categoriaAtual = 'destaques';

async function carregarVitrine() {
  const res = await fetch('/api/produtos');
  todosProdutos = await res.json();

  if (todosProdutos.length === 0) {
    document.getElementById('secaoProdutos').innerHTML = '<div class="vazio">Nenhuma oferta disponível.</div>';
    return;
  }

  // Gera abas dinamicamente
  const categorias = ['destaques', ...new Set(todosProdutos.map(p => p.categoria || 'Geral'))];
  const tabsDiv = document.getElementById('tabs');
  tabsDiv.innerHTML = categorias.map(cat =>
    `<button class="tab ${cat === 'destaques' ? 'ativo' : ''}" data-categoria="${cat}">
      ${cat === 'destaques' ? '⭐ Destaques' : cat}
    </button>`
  ).join('');

  renderizarSecao();
  ativarTabs();
  ativarBusca();
}

function renderizarSecao() {
  const container = document.getElementById('secaoProdutos');
  let produtosFiltrados = [];

  if (categoriaAtual === 'destaques') {
    produtosFiltrados = todosProdutos.filter(p => p.destaque).slice(0, 6);
    if (produtosFiltrados.length === 0) {
      produtosFiltrados = todosProdutos.slice(0, 6);
    }
  } else {
    produtosFiltrados = todosProdutos.filter(p => (p.categoria || 'Geral') === categoriaAtual);
  }

  if (produtosFiltrados.length === 0) {
    container.innerHTML = '<div class="vazio">Nenhum produto nesta categoria.</div>';
    return;
  }

  container.innerHTML = `
    <h3 class="section-title">
      ${categoriaAtual === 'destaques' ? '⭐ Ofertas em Destaque' : `📦 ${categoriaAtual}`}
    </h3>
    <div class="grid" id="gridProdutos"></div>
  `;

  const grid = document.getElementById('gridProdutos');
  produtosFiltrados.forEach((produto, index) => {
    const precoFormatado = produto.preco ?
      `R$ ${parseFloat(produto.preco).toFixed(2).replace('.', ',')}` :
      'Consulte';

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${index * 0.05}s`;
    card.innerHTML = `
      <div class="card-img-wrapper">
        <img src="${produto.img}" alt="${produto.nome}" onerror="this.src='https://via.placeholder.com/400x280/667eea/ffffff?text=Sem+Imagem'">
        <div class="badge-categoria">${produto.categoria || 'Geral'}</div>
        <div class="badge-oferta">OFERTA</div>
      </div>
      <div class="card-body">
        <h3>${produto.nome}</h3>
        <div class="preco">${precoFormatado}</div>
        <a href="${produto.link}" 
           target="_blank" 
           class="btn-comprar"
           onclick="gtag('event', 'clique_afiliado', {
             'nome_produto': '${produto.nome.replace(/'/g, "\\'")}',
             'categoria': '${produto.categoria || 'Geral'}',
             'preco': '${produto.preco}'
           });">
           COMPRAR AGORA
        </a>
      </div>
    `;
    grid.appendChild(card);
  });
}

function ativarTabs() {
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      categoriaAtual = btn.dataset.categoria;
      renderizarSecao();
    });
  });
}

function ativarBusca() {
  document.getElementById('campoBusca').addEventListener('input', (e) => {
    const termo = e.target.value.toLowerCase();
    if (!termo) {
      renderizarSecao();
      return;
    }

    const resultados = todosProdutos.filter(p =>
      p.nome.toLowerCase().includes(termo)
    );

    const container = document.getElementById('secaoProdutos');
    container.innerHTML = `
      <h3 class="section-title">🔍 Resultados para "${termo}"</h3>
      <div class="grid" id="gridProdutos"></div>
    `;

    const grid = document.getElementById('gridProdutos');
    if (resultados.length === 0) {
      grid.innerHTML = '<div class="vazio">Nenhum produto encontrado.</div>';
      return;
    }

    resultados.forEach((produto, index) => {
      const precoFormatado = produto.preco ?
        `R$ ${parseFloat(produto.preco).toFixed(2).replace('.', ',')}` :
        'Consulte';

      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${index * 0.05}s`;
      card.innerHTML = `
        <div class="card-img-wrapper">
          <img src="${produto.img}" alt="${produto.nome}">
          <div class="badge-categoria">${produto.categoria || 'Geral'}</div>
          <div class="badge-oferta">OFERTA</div>
        </div>
        <div class="card-body">
          <h3>${produto.nome}</h3>
          <div class="preco">${precoFormatado}</div>
          <a href="${produto.link}" 
             target="_blank" 
             class="btn-comprar"
             onclick="gtag('event', 'clique_afiliado', {
               'nome_produto': '${produto.nome.replace(/'/g, "\\'")}',
               'categoria': '${produto.categoria || 'Geral'}',
               'preco': '${produto.preco}'
             });">
             COMPRAR AGORA
          </a>
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

window.onload = carregarVitrine;
</script>
</body>
</html>
