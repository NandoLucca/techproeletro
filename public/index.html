<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechProEletro - Ofertas Amazon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
        header { background: #1e293b; padding: 20px 0; border-bottom: 1px solid #334155; text-align: center; }
        header h1 { color: #f1f5f9; font-size: 2.5rem; }
        header h1 span { color: #3b82f6; }
        header p { color: #94a3b8; margin-top: 8px; font-size: 1.1rem; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { color: #f1f5f9; font-size: 1.2rem; margin-bottom: 10px; }
        .card-body .preco { color: #3b82f6; font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 12px; background: #3b82f6; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn:hover { background: #2563eb; }
        .loading { text-align: center; padding: 60px; font-size: 1.2rem; color: #64748b; }
        footer { text-align: center; padding: 40px 20px; color: #64748b; border-top: 1px solid #334155; margin-top: 60px; }
    </style>
</head>
<body>
    <header>
        <h1>TechProEletro <span>⚡</span></h1>
        <p>Ofertas Amazon com até 40% OFF</p>
    </header>

    <div class="container">
        <div class="grid" id="produtos">
            <div class="loading">Carregando ofertas...</div>
        </div>
    </div>

    <footer>
        <p>TechProEletro © 2026 - Todos os direitos reservados</p>
        <p style="margin-top:10px; font-size:0.9rem;">Como Associado Amazon, recebemos por compras qualificadas.</p>
    </footer>

    <script>
        async function carregarProdutos() {
            const grid = document.getElementById('produtos');
            try {
                const resposta = await fetch('/api/produtos');
                const produtos = await resposta.json();
                
                if (produtos.length === 0) {
                    grid.innerHTML = '<div class="loading">Nenhum produto cadastrado ainda.</div>';
                    return;
                }

                grid.innerHTML = '';
                produtos.forEach(p => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${p.img}" alt="${p.nome}">
                            <div class="card-body">
                                <h3>${p.nome}</h3>
                                <div class="preco">R$ ${p.preco}</div>
                                <a href="${p.link}" target="_blank" class="btn">Comprar na Amazon</a>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                grid.innerHTML = '<div class="loading">Erro ao carregar produtos.</div>';
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
