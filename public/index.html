<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechProEletro - Ofertas Exclusivas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0c29;
      background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
      color: #fff;
      overflow-x: hidden;
    }
    
    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(15, 12, 41, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 25px 20px;
    }
    .header-content {
      max-width: 1300px;
      margin: 0 auto;
    }
    
    /* LOGO GRANDE */
    .logo {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(102, 126, 234, 0.6);
      display: inline-block;
      letter-spacing: -1px;
    }
    
    .tagline {
      font-size: 14px;
      opacity: 0.6;
      margin-top: 8px;
      font-weight: 400;
    }
    
    /* HERO MENOR */
    .hero {
      text-align: center;
      padding: 50px 20px 30px;
      max-width: 800px;
      margin: 0 auto;
    }
    .hero h2 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
      color: #fff;
      opacity: 0.95;
    }
    .hero p {
      font-size: 16px;
      opacity: 0.7;
      font-weight: 400;
    }
    
    /* CONTAINER PRODUTOS */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      margin-top: 20px;
    }
    
    /* CARD 3D */
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: aparecer 0.5s ease-out backwards;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    
    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 20px 50px rgba(102, 126, 234, 0.3);
      border-color: rgba(102, 126, 234, 0.4);
    }
    
    /* WRAPPER DA IMAGEM - AQUI É A MÁGICA DO ENQUADRAMENTO */
    .card-img-wrapper {
      position: relative;
      overflow: hidden;
      height: 280px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.5s;
    }
    .card:hover img {
      transform: scale(1.05);
    }
    
    .badge-oferta {
      position: absolute;
      top: 15px;
      right: 15px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
      z-index: 2;
    }
    
    .card-body {
      padding: 25px;
    }
    .card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      min-height: 45px;
      color: #fff;
      line-height: 1.4;
    }
    .preco {
      font-size: 34px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0 20px;
    }
    .btn-comprar {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-comprar:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }
    
    .loading {
      text-align: center;
      padding: 80px 20px;
      font-size: 18px;
      opacity: 0.6;
      grid-column: 1/-1;
    }
    .vazio {
      text-align: center;
      padding: 80px 20px;
      opacity: 0.6;
      grid-column: 1/-1;
    }
    
    /* RODAPÉ PROFISSIONAL */
    footer {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      text-align: center;
      padding: 35px 20px;
      margin-top: 80px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    footer p {
      opacity: 0.6;
      font-size: 14px;
      font-weight: 400;
    }
    footer .copyright {
      font-weight: 500;
      margin-bottom: 8px;
      opacity: 0.8;
    }
    
    @media (max-width: 768px) {
      .logo { font-size: 32px; }
      .hero h2 { font-size: 26px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div>
        <div class="logo">🚀 TechProEletro</div>
        <div class="tagline">Tecnologia e Inovação</div>
      </div>
    </div>
  </div>

  <div class="hero">
    <h2>Ofertas Que Saltam Da Tela</h2>
    <p>Produtos selecionados com os melhores preços do mercado</p>
  </div>

  <div class="container">
    <div id="produtos" class="grid">
      <div class="loading">⚡ Carregando ofertas...</div>
    </div>
  </div>

  <footer>
    <p class="copyright">&copy; 2026 TechProEletro. Todos os direitos reservados.</p>
    <p>CNPJ: 00.000.000/0001-00 | Contato: contato@techproeletro.com</p>
  </footer>

<script>
async function carregarVitrine() {
  const container = document.getElementById('produtos');
  
  try {
    const res = await fetch('/api/produtos');
    const produtos = await res.json();

    if (produtos.length === 0) {
      container.innerHTML = '<div class="vazio">Nenhuma oferta disponível no momento. Volte em breve!</div>';
      return;
    }

    container.innerHTML = '';
    
    produtos.forEach((produto, index) => {
      const precoFormatado = produto.preco? 
        `R$ ${parseFloat(produto.preco).toFixed(2).replace('.', ',')}` : 
        'Consulte';
      
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${index * 0.1}s`;
      card.innerHTML = `
        <div class="card-img-wrapper">
          <img src="${produto.img}" alt="${produto.nome}" onerror="this.src='https://via.placeholder.com/400x280/667eea/ffffff?text=Sem+Imagem'">
          <div class="badge-oferta">Oferta</div>
        </div>
        <div class="card-body">
          <h3>${produto.nome}</h3>
          <div class="preco">${precoFormatado}</div>
          <a href="${produto.link}" target="_blank" class="btn-comprar">Comprar Agora</a>
        </div>
      `;
      container.appendChild(card);
    });

  } catch (error) {
    console.error('Erro:', error);
    container.innerHTML = '<div class="vazio">Erro ao carregar ofertas. Tente novamente.</div>';
  }
}

window.onload = carregarVitrine;
</script>
</body>
</html>
