<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ TechProEletro - Comparou, comprou mais barato</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        header { background: #232f3e; color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { font-size: 28px; margin-bottom: 5px; }
        .logo p { font-size: 14px; color: #ffa41c; }
        .menu { display: flex; gap: 25px; }
        .menu a { color: white; text-decoration: none; font-weight: 500; }
        .menu a:hover { color: #ffa41c; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .titulo-secao { font-size: 32px; margin-bottom: 30px; text-align: center; color: #232f3e; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card-produto { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .card-produto:hover { transform: translateY(-5px); }
        .card-produto img { width: 100%; height: 250px; object-fit: contain; margin-bottom: 15px; }
        .card-produto h3 { font-size: 18px; margin-bottom: 10px; color: #232f3e; min-height: 50px; }
        .preco { font-size: 24px; font-weight: bold; color: #B12704; margin: 15px 0; }
        .btn-comprar { display: block; width: 100%; padding: 12px; background: #FFD814; color: #0F1111; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; }
        .btn-comprar:hover { background: #F7CA00; }
        .btn-comprar.desabilitado { background: #ccc; cursor: not-allowed; }
        footer { background: #232f3e; color: white; text-align: center; padding: 30px; margin-top: 60px; }
        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 15px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>⚡ TechProEletro</h1>
            <p>Comparou, comprou mais barato. Ofertas atualizadas 24h</p>
        </div>
        <nav class="menu">
            <a href="#ofertas">Ofertas</a>
            <a href="#smartphones">Smartphones</a>
            <a href="#casa">Casa Inteligente</a>
            <a href="#acessorios">Acessórios</a>
        </nav>
    </header>

    <div class="container">
        <h2 class="titulo-secao" id="ofertas">Ofertas em Destaque</h2>
        <div class="grid-produtos" id="grid-produtos"></div>
    </div>

    <footer>
        <p>⚡ TechProEletro © 2026 - Comparou, comprou mais barato</p>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.7;">
            Como associado da Amazon, ganhamos com compras qualificadas.
        </p>
    </footer>

    <script>
        async function carregarProdutos() {
            try {
                const resposta = await fetch('/api/produtos');
                const produtos = await resposta.json();
                const grid = document.getElementById('grid-produtos');
                
                produtos.forEach(function(produto) {
                    const card = document.createElement('div');
                    card.className = 'card-produto';
                    
                    const temLinkValido = produto.linkAfiliado && produto.linkAfiliado.indexOf('SEU-LINK') === -1;
                    
                    let botaoHTML = '';
                    if (temLinkValido) {
                        botaoHTML = '<a href="' + produto.linkAfiliado + '" target="_blank" class="btn-comprar">Comprar na Amazon</a>';
                    } else {
                        botaoHTML = '<button class="btn-comprar desabilitado">Comprar - Em breve</button>';
                    }
                    
                    const precoFormatado = 'R$ ' + produto.preco.toFixed(2).replace('.', ',');
                    
                    card.innerHTML = '<img src="' + produto.imagem + '" alt="' + produto.nome + '"><h3>' + produto.nome + '</h3><div class="preco">' + precoFormatado + '</div>' + botaoHTML;
                    
                    grid.appendChild(card);
                });
                
            } catch (erro) {
                console.error('Erro:', erro);
                document.getElementById('grid-produtos').innerHTML = '<p>Erro ao carregar produtos.</p>';
            }
        }
        
        carregarProdutos();
    </script>
</body>
</html>
