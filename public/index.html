<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechProEletro - Tecnologia e Inovação</title>
  
  <!-- Google Analytics - TROCA G-XXXXXXXXXX PELO TEU ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #0a0a1a 0%, #0f0c29 50%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      padding: 25px 20px;
      box-shadow: 0 4px 30px rgba(168, 85, 247, 0.2);
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo-area h1 {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(90deg, #8b5cf6 0%, #a855f7 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 0 15px rgba(168, 85, 247, 0.4), 
                   0 2px 8px rgba(139, 92, 246, 0.3);
      filter: drop-shadow(0 0 8px rgba(168, 85, 247, 0.4));
    }

    .logo-area p {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 8px;
      margin-left: 54px;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      padding: 14px 24px;
      padding-right: 50px;
      border: 2px solid #8b5cf6;
      background: rgba(255,255,255,0.08);
      color: white;
      border-radius: 30px;
      width: 340px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .search-box input:focus {
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
      border-color: #a855f7;
    }

    .search-box input::placeholder {
      color: #94a3b8;
    }

    .tabs-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }

    .tabs {
      display: flex;
      gap: 0;
      justify-content: center;
    }

    .tab {
      padding: 18px 40px;
      background: transparent;
      color: #cbd5e1;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab:hover {
      color: #e9d5ff;
      background: rgba(139, 92, 246, 0.1);
    }

    .tab.ativo {
      color: #fff;
      border-bottom: 3px solid #a855f7;
      background: rgba(139, 92, 246, 0.15);
    }

    .container {
      max-width: 1400px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .grid-produtos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 35px;
    }

    .card-produto {
      background: rgba(20, 18, 50, 0.7);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(139, 92, 246, 0.25);
      transition: all 0.4s;
    }

    .card-produto:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 50px rgba(139, 92, 246, 0.5);
      border-color: rgba(168, 85, 247, 0.8);
    }

    .card-img-container {
      background: white;
      padding: 30px;
      position: relative;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .badge-categoria {
      position: absolute;
      top: 18px;
      left: 18px;
      background: rgba(20, 18, 50, 0.95);
      color: #e9d5ff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-oferta {
      position: absolute;
      top: 18px;
      right: 18px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 0 4px 20px rgba(245, 87, 108, 0.5);
      animation: pulse 2s infinite;
      letter-spacing: 0.5px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(245, 87, 108, 0.5); }
      50% { transform: scale(1.08); box-shadow: 0 6px 30px rgba(245, 87, 108, 0.7); }
    }

    .card-conteudo {
      padding: 28px;
    }

    .card-nome {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 24px;
      line-height: 1.6;
      min-height: 48px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* NOVO BOTÃO AMARELO - VER OFERTA */
    .btn-ver-oferta {
      width: 100%;
      padding: 18px;
      background: #FFD814;
      color: #0F1111;
      border: 2px solid #FCD200;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      text-align: center;
      display: block;
      box-shadow: 0 6px 20px rgba(255, 216, 20, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: pulse-amarelo 2s infinite;
    }

    .btn-ver-oferta:hover {
      background: #F7CA00;
      transform: scale(1.04);
      box-shadow: 0 8px 30px rgba(255, 216, 20, 0.6);
    }

    @keyframes pulse-amarelo {
      0%, 100% { box-shadow: 0 6px 20px rgba(255, 216, 20, 0.4); }
      50% { box-shadow: 0 6px 30px rgba(255, 216, 20, 0.7); }
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      font-size: 18px;
      color: #cbd5e1;
    }

    footer {
      background: #0a0818;
      color: #94a3b8;
      text-align: center;
      padding: 50px 20px;
      margin-top: 100px;
      border-top: 1px solid rgba(139, 92, 246, 0.3);
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
      }
      .search-box input {
        width: 100%;
      }
      .grid-produtos {
        grid-template-columns: 1fr;
      }
      .logo-area h1 {
        font-size: 32px;
      }
      .logo-area p {
        margin-left: 0;
        text-align: center;
      }
      .tabs {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo-area">
        <h1>🚀 TechProEletro</h1>
        <p>Tecnologia e Inovação</p>
      </div>
      <div class="search-box">
        <input type="text" id="busca" placeholder="Buscar produto...">
      </div>
    </div>
  </header>

  <div class="tabs-container">
    <div class="tabs" id="tabs">
      <button class="tab ativo" data-tab="destaques">⭐ Destaques</button>
      <button class="tab" data-tab="todos">Todos</button>
    </div>
  </div>

  <div class="container">
    <div class="section-title" id="sectionTitle">
      <span>📦</span>
      <span>Destaques</span>
    </div>

    <div class="grid-produtos" id="produtos">
      <div class="loading">Carregando ofertas...</div>
    </div>
  </div>

  <footer>
    <p>TechProEletro © 2026 - Todos os direitos reservados</p>
    <p style="margin-top: 10px; font-size: 13px;">Este site contém links de afiliado. Podemos receber comissão por compras realizadas.</p>
  </footer>

  <script>
    let todosProdutos = [];
    let abaAtual = 'destaques';

    function rastrearClique(produto) {
      gtag('event', 'clique_afiliado', {
        'produto_nome': produto.nome,
        'produto_preco': produto.preco,
        'produto_categoria': produto.categoria || 'Eletrônicos',
        'link_destino': produto.link
      });
    }

    function ehDestaque(produto) {
      return produto.destaque === true || 
             produto.destaque === 'true' || 
             produto.destaque === 1 || 
             produto.destaque === '1' ||
             produto.destaque === 'on';
    }

    function renderizarProdutos(produtos) {
      const container = document.getElementById('produtos');
      
      if (produtos.length === 0) {
        container.innerHTML = '<div class="loading">Nenhum produto encontrado.</div>';
        return;
      }

      container.innerHTML = produtos.map(produto => `
        <div class="card-produto">
          <div class="card-img-container">
            <span class="badge-categoria">${produto.categoria || 'ELETRÔNICOS'}</span>
            ${ehDestaque(produto) ? '<span class="badge-oferta">OFERTA</span>' : ''}
            <img src="${produto.img}" alt="${produto.nome}" class="card-img" loading="lazy">
          </div>
          <div class="card-conteudo">
            <h3 class="card-nome">${produto.nome}</h3>
            <a href="${produto.link}" 
               target="_blank" 
               class="btn-ver-oferta"
               onclick="rastrearClique(${JSON.stringify(produto).replace(/"/g, '&quot;')})">
               VER OFERTA
            </a>
          </div>
        </div>
      `).join('');
    }

    function atualizarAba(aba) {
      abaAtual = aba;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
      document.querySelector(`[data-tab="${aba}"]`).classList.add('ativo');
      
      const title = document.getElementById('sectionTitle');
      let produtosFiltrados = [];
      
      if (aba === 'destaques') {
        produtosFiltrados = todosProdutos.filter(p => ehDestaque(p));
        title.innerHTML = '<span>⭐</span><span>Destaques</span>';
      } else if (aba === 'todos') {
        produtosFiltrados = todosProdutos;
        title.innerHTML = '<span>📦</span><span>Todos os Produtos</span>';
      } else {
        produtosFiltrados = todosProdutos.filter(p => (p.categoria || 'Eletrônicos') === aba);
        title.innerHTML = `<span>📦</span><span>${aba}</span>`;
      }
      
      renderizarProdutos(produtosFiltrados);
    }

    function criarAbas(produtos) {
      const categorias = [...new Set(produtos.map(p => p.categoria || 'Eletrônicos'))];
      const container = document.getElementById('tabs');
      
      const botoesCategorias = categorias.map(cat => 
        `<button class="tab" data-tab="${cat}">${cat}</button>`
      ).join('');
      
      container.innerHTML = `
        <button class="tab ativo" data-tab="destaques">⭐ Destaques</button>
        <button class="tab" data-tab="todos">Todos</button>
        ${botoesCategorias}
      `;

      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          atualizarAba(btn.dataset.tab);
        });
      });
    }

    document.getElementById('busca').addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase();
      const filtrados = todosProdutos.filter(p => 
        p.nome.toLowerCase().includes(termo) || 
        (p.categoria || '').toLowerCase().includes(termo)
      );
      renderizarProdutos(filtrados);
    });

    async function carregarProdutos() {
      try {
        const res = await fetch('/api/produtos');
        todosProdutos = await res.json();
        
        todosProdutos.sort((a, b) => {
          if (ehDestaque(a) && !ehDestaque(b)) return -1;
          if (!ehDestaque(a) && ehDestaque(b)) return 1;
          return 0;
        });

        criarAbas(todosProdutos);
        atualizarAba('destaques');
      } catch (error) {
        document.getElementById('produtos').innerHTML = 
          '<div class="loading">Erro ao carregar produtos. Tente novamente.</div>';
        console.error('Erro:', error);
      }
    }

    carregarProdutos();
  </script>
</body>
</html>
