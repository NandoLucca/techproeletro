<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechProEletro - Ofertas em Tecnologia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
    header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 1px solid #334155; }
    h1 { font-size: 32px; color: #f1f5f9; }
    h1 span { color: #3b82f6; }
    .sub { color: #94a3b8; margin-top: 8px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; transition: 0.3s; }
    .card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    .card img { width: 100%; height: 250px; object-fit: cover; background: #0f172a; }
    .info { padding: 20px; }
    .info h3 { font-size: 18px; margin-bottom: 12px; color: #f1f5f9; min-height: 44px; }
    .preco-aviso { color: #3b82f6; font-size: 16px; margin-bottom: 15px; font-weight: bold; }
    .btn { display: block; width: 100%; padding: 12px; background: #3b82f6; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: #2563eb; }
    footer { text-align: center; padding: 30px; color: #64748b; border-top: 1px solid #334155; margin-top: 40px; }
    .loading { text-align: center; padding: 60px; color: #94a3b8; font-size: 18px; }
  </style>
</head>
<body>
  <header>
    <h1>TechPro<span>Eletro</span></h1>
    <p class="sub">As melhores ofertas de tecnologia com links de afiliado</p>
  </header>

  <div class="container">
    <div id="grid-produtos" class="grid">
      <div class="loading">Carregando ofertas...</div>
    </div>
  </div>

  <footer>
    © 2026 TechProEletro - Links de afiliado Amazon
  </footer>

  <script>
    async function carregarVitrine() {
      try {
        const resposta = await fetch('/api/produtos');
        const produtos = await resposta.json();
        const grid = document.getElementById('grid-produtos');
        
        if (produtos.length === 0) {
          grid.innerHTML = '<div class="loading">Nenhum produto cadastrado ainda.</div>';
          return;
        }

        grid.innerHTML = '';
        produtos.forEach(p => {
          grid.innerHTML += `
            <div class="card">
              <img src="${p.img}" alt="${p.nome}">
              <div class="info">
                <h3>${p.nome}</h3>
                <div class="preco-aviso">Confira o preço na Amazon</div>
                <a href="${p.link}" target="_blank" class="btn">Ver Oferta na Amazon</a>
              </div>
            </div>
          `;
        });
      } catch (error) {
        document.getElementById('grid-produtos').innerHTML = '<div class="loading">Erro ao carregar produtos.</div>';
      }
    }

    carregarVitrine();
  </script>
</body>
</html>
