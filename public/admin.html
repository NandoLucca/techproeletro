<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - TechProEletro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }
    h2 {
      color: #333;
      margin-bottom: 25px;
      text-align: center;
      font-size: 28px;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    button.btn-menor {
      background: #6c757d;
      width: auto;
      padding: 10px 20px;
      margin-bottom: 15px;
    }
    #formulario { display: none; }
    #msg {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
      min-height: 20px;
    }
    .sucesso { color: #28a745; }
    .erro { color: #dc3545; }
    label {
      display: block;
      margin-top: 10px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    hr {
      margin: 40px 0;
      border: none;
      border-top: 2px solid #e0e0e0;
    }
    .tabela-wrapper {
      overflow-x: auto;
      margin-top: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    th {
      background: #f8f9fa;
      color: #333;
      font-weight: 600;
      white-space: nowrap;
    }
    tr:hover {
      background: #f8f9fa;
    }
    .img-mini {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    #login { max-width: 450px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <div id="login">
      <h2>🔐 Painel Admin</h2>
      <input type="password" id="senha" placeholder="Digite sua senha">
      <button onclick="entrar()">Entrar</button>
    </div>

    <div id="formulario">
      <h2>📦 Cadastrar Produto</h2>
      <label>Nome do produto</label>
      <input type="text" id="nome" placeholder="Ex: Notebook Gamer">

      <label>Preço</label>
      <input type="text" id="preco" placeholder="Ex: R$ 2.999,90">

      <label>Link da imagem</label>
      <input type="text" id="img" placeholder="https://...">

      <label>Link de afiliado</label>
      <input type="text" id="link" placeholder="https://...">

      <button onclick="salvar()">Salvar no Supabase</button>
      <p id="msg"></p>

      <hr>

      <h2>📋 Produtos Cadastrados</h2>
      <button class="btn-menor" onclick="carregarProdutos()">🔄 Atualizar Lista</button>
      
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagem</th>
              <th>Nome</th>
              <th>Preço</th>
              <th>Link</th>
              <th>Criado em</th>
            </tr>
          </thead>
          <tbody id="lista-produtos">
            <tr><td colspan="6" style="text-align: center;">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script>
function entrar() {
  const senhaDigitada = document.getElementById('senha').value.trim();

  if (senhaDigitada === 'techpro2026') {
    document.getElementById('login').style.display = 'none';
    document.getElementById('formulario').style.display = 'block';
    carregarProdutos(); // Já puxa a lista quando loga
  } else {
    alert('Senha incorreta! Você digitou: [' + senhaDigitada + ']');
  }
}

async function salvar() {
  const produto = {
    nome: document.getElementById('nome').value,
    preco: document.getElementById('preco').value,
    img: document.getElementById('img').value,
    link: document.getElementById('link').value
  };

  const msg = document.getElementById('msg');

  if (!produto.nome || !produto.img || !produto.link) {
    msg.textContent = 'Preenche nome, imagem e link, meu consagrado';
    msg.className = 'erro';
    return;
  }

  msg.textContent = 'Salvando no banco...';
  msg.className = '';

  try {
    const res = await fetch('/api/produtos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(produto)
    });

    const data = await res.json();

    if (res.ok) {
      msg.textContent = 'Produto salvo no Supabase! ✅';
      msg.className = 'sucesso';
      document.getElementById('nome').value = '';
      document.getElementById('preco').value = '';
      document.getElementById('img').value = '';
      document.getElementById('link').value = '';
      carregarProdutos(); // Atualiza a lista sozinho, Nando
    } else {
      msg.textContent = 'Erro: ' + data.erro;
      msg.className = 'erro';
      console.log('Erro Supabase:', data);
    }
  } catch (e) {
    msg.textContent = 'Erro de conexão com servidor';
    msg.className = 'erro';
    console.log('Erro fetch:', e);
  }
}

async function carregarProdutos() {
  const tbody = document.getElementById('lista-produtos');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Buscando produtos...</td></tr>';

  try {
    const res = await fetch('/api/produtos');
    const produtos = await res.json();

    if (!res.ok) throw new Error('Erro ao buscar');

    if (produtos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhum produto cadastrado ainda, Nando 😅</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    
    produtos.forEach(produto => {
      const dataFormatada = new Date(produto.criado_em).toLocaleDateString('pt-BR');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${produto.id}</td>
        <td><img src="${produto.img}" class="img-mini" onerror="this.src='https://via.placeholder.com/60?text=Erro'"></td>
        <td>${produto.nome}</td>
        <td>${produto.preco || 'Sem preço'}</td>
        <td><a href="${produto.link}" target="_blank">Abrir</a></td>
        <td>${dataFormatada}</td>
      `;
      tbody.appendChild(tr);
    });

  } catch (error) {
    console.error('Deu ruim ao buscar:', error);
    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nando, cê meteu o louco aqui ó: erro ao carregar 😂</td></tr>';
  }
}
</script>
</body>
</html>
